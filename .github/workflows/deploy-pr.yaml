name: 'deploy'
on:
  pull_request:
    branches: [pro1dev,pro1release,preprod,main]
    types: [closed]

jobs:
  validate-pr:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags

      - name: branches info
        run: |
          echo "GITHUB_HEAD_REF=${{github.head_ref}}" >> $GITHUB_ENV
          echo "GITHUB_BASE_REF=${{github.base_ref}}" >> $GITHUB_ENV
          echo "Deployment Branch"
          git log -1

      - name: 'Validate Code Changes from ${{env.GITHUB_HEAD_REF}} to ${{env.GITHUB_BASE_REF}}'
        run: |
          
          git diff origin/${{env.GITHUB_HEAD_REF}}..origin/${{env.GITHUB_BASE_REF}}
          echo $GITHUB_HEAD_REF
          echo $GITHUB_BASE_REF
          # Add your validation commands here, for example: